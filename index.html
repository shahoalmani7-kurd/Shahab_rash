<!DOCTYPE html>
<html>

<title>My App Store</title>

<style>

  text-align:center;
  color:white;
}

h1 {
  margin-top:40px;
}

.card {
  background:white;
  color:black;
  padding:25px;
  margin:20px;
  border-radius:20px;
  display:inline-block;
  width:180px;
  box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

.card img {
  width:80px;
  border-radius:15px;
}

.btn {
  display:block;
  margin-top:10px;
  padding:10px;
  border-radius:15px;
  text-decoration:none;
  color:white;
  font-weight:bold;
}

.install { background:#007aff; }

</style>

</head>

<body>

<h1>My Apps</h1>

    Install

<!-- Video Star -->
